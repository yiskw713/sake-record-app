<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本酒記録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <span class="nav-title">🍶 日本酒記録</span>
    <a href="index.html" class="active">記録</a>
    <a href="stats.html">統計</a>
    <a href="quiz.html">クイズ</a>
  </nav>

  <main>
    <h1>日本酒を記録する</h1>

    <div id="form-message" class="message hidden" role="alert" aria-live="polite"></div>

    <!-- もしかして？確認パネル -->
    <div id="suggestion-panel" class="suggestion-panel hidden" role="dialog" aria-labelledby="suggestion-panel-title">
      <p id="suggestion-panel-title" class="suggestion-panel-title">もしかしてこれかも？</p>
      <div id="suggestion-panel-brand" class="suggestion-group hidden">
        <p class="suggestion-group-label">銘柄名の候補：</p>
        <div id="suggestion-brand-list" class="suggestion-list"></div>
      </div>
      <div id="suggestion-panel-brewery" class="suggestion-group hidden">
        <p class="suggestion-group-label">酒蔵名の候補：</p>
        <div id="suggestion-brewery-list" class="suggestion-list"></div>
      </div>
      <button type="button" id="suggestion-skip-btn" class="btn btn-secondary">このまま記録する</button>
    </div>

    <form id="sake-form" novalidate>
      <div class="form-group">
        <label for="brand">銘柄名<span class="required">*</span></label>
        <input type="text" id="brand" name="brand" maxlength="50" autocomplete="off" required>
      </div>

      <div class="form-group">
        <label for="brewery">酒蔵名<span class="required">*</span></label>
        <input type="text" id="brewery" name="brewery" maxlength="50" required>
      </div>

      <div class="form-group">
        <label for="prefecture">都道府県<span class="required">*</span></label>
        <select id="prefecture" name="prefecture" required>
          <option value="">-- 選択してください --</option>
          <option>北海道</option>
          <option>青森県</option><option>岩手県</option><option>宮城県</option>
          <option>秋田県</option><option>山形県</option><option>福島県</option>
          <option>茨城県</option><option>栃木県</option><option>群馬県</option>
          <option>埼玉県</option><option>千葉県</option><option>東京都</option>
          <option>神奈川県</option><option>新潟県</option><option>富山県</option>
          <option>石川県</option><option>福井県</option><option>山梨県</option>
          <option>長野県</option><option>岐阜県</option><option>静岡県</option>
          <option>愛知県</option><option>三重県</option><option>滋賀県</option>
          <option>京都府</option><option>大阪府</option><option>兵庫県</option>
          <option>奈良県</option><option>和歌山県</option><option>鳥取県</option>
          <option>島根県</option><option>岡山県</option><option>広島県</option>
          <option>山口県</option><option>徳島県</option><option>香川県</option>
          <option>愛媛県</option><option>高知県</option><option>福岡県</option>
          <option>佐賀県</option><option>長崎県</option><option>熊本県</option>
          <option>大分県</option><option>宮崎県</option><option>鹿児島県</option>
          <option>沖縄県</option>
        </select>
      </div>

      <div class="form-group">
        <label for="city">市町村<span class="required">*</span></label>
        <input type="text" id="city" name="city" maxlength="50" required>
      </div>

      <div class="form-group">
        <label for="drankAt">飲んだ日付<span class="required">*</span></label>
        <input type="date" id="drankAt" name="drankAt" required>
      </div>

      <div class="form-group">
        <label for="note">感想</label>
        <textarea id="note" name="note" maxlength="500" rows="3" placeholder="任意（500文字以内）"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">記録する</button>
    </form>
  </main>

  <script src="js/config.js"></script>
  <script src="js/suggest.js"></script>
  <script src="js/form.js"></script>
  <script>
    // --- 日付の初期値設定 ---
    (function() {
      var now = new Date();
      var today = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 10);
      var drankAtInput = document.getElementById('drankAt');
      drankAtInput.value = today;
      drankAtInput.max = today;
    })();

    var recordsCache = null;

    function loadRecords() {
      if (recordsCache) return Promise.resolve(recordsCache);
      return fetch(CONFIG.GAS_URL + '?action=getBrands')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          recordsCache = data.records || [];
          return recordsCache;
        });
    }

    var brandInput = document.getElementById('brand');
    var breweryInput = document.getElementById('brewery');
    var prefectureSelect = document.getElementById('prefecture');
    var cityInput = document.getElementById('city');
    var formMessage = document.getElementById('form-message');
    var submitBtn = document.getElementById('submit-btn');
    var suggestionPanel = document.getElementById('suggestion-panel');
    var suggestionPanelBrand = document.getElementById('suggestion-panel-brand');
    var suggestionPanelBrewery = document.getElementById('suggestion-panel-brewery');
    var suggestionBrandList = document.getElementById('suggestion-brand-list');
    var suggestionBreweryList = document.getElementById('suggestion-brewery-list');
    var suggestionSkipBtn = document.getElementById('suggestion-skip-btn');

    var pendingSubmitData = null;

    function showSuggestionPanel(brandSuggestions, brewerySuggestions) {
      suggestionBrandList.innerHTML = '';
      suggestionBreweryList.innerHTML = '';

      if (brandSuggestions.length > 0) {
        brandSuggestions.forEach(function(s) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'suggestion-choice-btn';
          var label = document.createTextNode(s.brand);
          btn.appendChild(label);
          if (s.isExactMatch) {
            var badge = document.createElement('span');
            badge.className = 'badge-registered';
            badge.textContent = '登録済み';
            btn.appendChild(badge);
          }
          btn.addEventListener('click', function() {
            brandInput.value = s.brand;
            hideSuggestionPanel();
            submitFormData(pendingSubmitData
              ? Object.assign({}, pendingSubmitData, { brand: s.brand })
              : null);
          });
          suggestionBrandList.appendChild(btn);
        });
        suggestionPanelBrand.classList.remove('hidden');
      } else {
        suggestionPanelBrand.classList.add('hidden');
      }

      if (brewerySuggestions.length > 0) {
        brewerySuggestions.forEach(function(s) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'suggestion-choice-btn';
          btn.textContent = s.brewery;
          btn.addEventListener('click', function() {
            breweryInput.value = s.brewery;
            if (s.prefecture) prefectureSelect.value = s.prefecture;
            if (s.city) cityInput.value = s.city;
            hideSuggestionPanel();
            submitFormData(pendingSubmitData
              ? Object.assign({}, pendingSubmitData, {
                  brewery: s.brewery,
                  prefecture: s.prefecture || pendingSubmitData.prefecture,
                  city: s.city || pendingSubmitData.city,
                })
              : null);
          });
          suggestionBreweryList.appendChild(btn);
        });
        suggestionPanelBrewery.classList.remove('hidden');
      } else {
        suggestionPanelBrewery.classList.add('hidden');
      }

      suggestionPanel.classList.remove('hidden');
      document.getElementById('sake-form').classList.add('hidden');
    }

    function hideSuggestionPanel() {
      suggestionPanel.classList.add('hidden');
      document.getElementById('sake-form').classList.remove('hidden');
      pendingSubmitData = null;
    }

    suggestionSkipBtn.addEventListener('click', function() {
      hideSuggestionPanel();
      if (pendingSubmitData) {
        submitFormData(pendingSubmitData);
        pendingSubmitData = null;
      }
    });

    function submitFormData(data) {
      if (!data) return;
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中…';
      hideMessage();

      fetch(CONFIG.GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(Object.assign({ action: 'addRecord' }, data))
      })
        .then(function(res) { return res.json(); })
        .then(function(result) {
          if (result.status === 'success') {
            showMessage('記録しました！（ID: ' + result.recordId + '）', 'success');
            document.getElementById('sake-form').reset();
            recordsCache = null;
            var now = new Date();
            var today = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
              .toISOString().slice(0, 10);
            document.getElementById('drankAt').value = today;
            document.getElementById('drankAt').max = today;
          } else {
            showMessage('エラーが発生しました: ' + (result.message || ''), 'error');
          }
        })
        .catch(function() {
          showMessage('通信エラーが発生しました。再度お試しください。', 'error');
        })
        .finally(function() {
          submitBtn.disabled = false;
          submitBtn.textContent = '記録する';
        });
    }

    // --- フォーム送信 ---
    document.getElementById('sake-form').addEventListener('submit', function(e) {
      e.preventDefault();

      var data = {
        brand: brandInput.value.trim(),
        brewery: breweryInput.value.trim(),
        prefecture: prefectureSelect.value,
        city: cityInput.value.trim(),
        drankAt: document.getElementById('drankAt').value,
        note: document.getElementById('note').value.trim()
      };

      var errors = validateForm(data);
      if (errors.length > 0) {
        showMessage(errors.join('\n'), 'error');
        return;
      }

      loadRecords().then(function(records) {
        var brandSuggestions = getSuggestions(data.brand, records);
        var hasBrandExact = brandSuggestions.some(function(s) { return s.isExactMatch; });
        var filteredBrand = hasBrandExact ? [] : brandSuggestions;

        var brewerySuggestions = getBrewerySuggestions(data.brewery, records);

        if (filteredBrand.length > 0 || brewerySuggestions.length > 0) {
          pendingSubmitData = data;
          showSuggestionPanel(filteredBrand, brewerySuggestions);
        } else {
          submitFormData(data);
        }
      }).catch(function() {
        submitFormData(data);
      });
    });

    function showMessage(text, type) {
      formMessage.textContent = text;
      formMessage.className = 'message message-' + type;
    }

    function hideMessage() {
      formMessage.className = 'message hidden';
    }
  </script>
</body>
</html>
